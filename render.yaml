services:
  - type: web
    name: nextbotics-fleet-pro-api
    runtime: node
    plan: free
    buildCommand: cd NextBotics_Fleet_Pro/backend && npm install && npm run build
    startCommand: cd NextBotics_Fleet_Pro/backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nextbotics-fleet-pro-db
          property: connectionString

databases:
  - name: nextbotics-fleet-pro-db
    plan: free
    databaseName: nextbotics_fleet_pro
    user: nextbotics_fleet_pro
